http {
    # Ensure nginx uses writable temp locations inside container (tmpfs mounted)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        http2 on;
        server_name localhost;
        server_tokens off;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        # Hardened CSP: avoid 'unsafe-inline' and 'unsafe-eval' for scripts. Use nonces in app for inline scripts.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;

        # Enable Gzip Compression
        gzip on;
        gzip_vary on;
        gzip_min_length 10240;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
        gzip_disable "MSIE [1-6]\.";

        # Serve Static Assets
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API Requests to FastAPI
        location /api/ {
            proxy_pass http://fastapi_gateway:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts and buffering for API streaming and long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # Proxy WebSocket Connections to FastAPI
        location /ws/ {
            proxy_pass http://fastapi_gateway:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            # Keep websocket connections long-lived
            proxy_read_timeout 86400; # Keep WS connections open for 24 hours
            proxy_buffering off;
        }

        # Proxy Intercept endpoint to FastAPI
        location /intercept {
            proxy_pass http://fastapi_gateway:8000/intercept;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # Proxy Health check
        location /health {
            proxy_pass http://fastapi_gateway:8000/health;
            proxy_set_header Host $host;
        }

        # Proxy Metrics
        location /metrics {
            proxy_pass http://fastapi_gateway:8000/metrics;
            proxy_set_header Host $host;
        }
    }
}
