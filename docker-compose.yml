version: '3.8'

# Reusable security constraints for SentinelCell agents
x-sentinel-constraints: &sentinel-constraints
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M
  cap_drop:
    - ALL
  read_only: true
  env_file:
    - .env
  volumes:
    - ./logs:/logs
    - ./chroma_db:/app/chroma_db
  tmpfs:
    - /temp

services:
  # 1. FastAPI Gateway (Guardian Mode)
  fastapi_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_fastapi
    command: ["uvicorn", "src.gateways.fastapi_gateway:app", "--host", "0.0.0.0", "--port", "8000"]
    <<: *sentinel-constraints

  # 2. Redis MQ Worker (Async Mode)
  redis_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_redis_worker
    command: ["python", "-m", "src.gateways.redis_mq"]
    depends_on:
      - redis
    <<: *sentinel-constraints

  # Infrastructure: Redis for MQ
  redis:
    image: redis:7-alpine
    container_name: sentinelcell_redis
    ports:
      - "6379:6379"

  # 3. Transparent Proxy (Envoy)
  envoy_proxy:
    image: envoyproxy/envoy:v1.27-latest
    container_name: sentinelcell_envoy
    ports:
      - "8080:8080" # Agents send traffic here instead of directly to each other
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - fastapi_gateway
