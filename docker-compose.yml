version: '3.8'

# Reusable security constraints for SentinelCell agents
x-sentinel-constraints: &sentinel-constraints
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M
  cap_drop:
    - ALL
  read_only: true
  env_file:
    - .env
  volumes:
    - ./logs:/app/logs
    - chroma_db:/app/chroma_db
  tmpfs:
    - /temp
    - /tmp
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # 1. FastAPI Gateway (Guardian Mode)
  fastapi_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_fastapi
    restart: unless-stopped
    command: ["gunicorn", "src.gateways.fastapi_gateway:app", "-w", "4", "-k", "uvicorn.workers.UvicornWorker", "-b", "0.0.0.0:8000"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_DIR=/app/logs
    networks:
      - sentinel_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    <<: *sentinel-constraints

  # 2. Redis MQ Worker (Async Mode)
  redis_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_redis_worker
    restart: unless-stopped
    command: ["python", "-m", "src.gateways.ingress_mq"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_DIR=/app/logs
    networks:
      - sentinel_net
    depends_on:
      redis:
        condition: service_healthy
    <<: *sentinel-constraints

  # 3. Dashboard Frontend (Nginx Isolated)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinelcell_dashboard
    restart: unless-stopped
    ports:
      - "3000:8080"
    networks:
      - sentinel_net
    depends_on:
      fastapi_gateway:
        condition: service_healthy
    <<: *sentinel-constraints
    cap_drop:
      - MAC_ADMIN
    tmpfs:
      - /temp
      - /var/cache/nginx
      - /var/run
  # 4. Redis In-Memory Datastore (Message Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: sentinelcell_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sentinel_net
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 5. Local Ollama LLM (Conditional via Profile)
  ollama:
    profiles:
      - ollama
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: sentinelcell_ollama
    ports:
      - "11434:11434"
    networks:
      - sentinel_net
    volumes:
      - ollama_data:/root/.ollama
    cap_drop:
      - MAC_ADMIN

networks:
  sentinel_net:
    name: sentinel_net
    external: true

volumes:
  redis_data:
  ollama_data:
  chroma_db:
