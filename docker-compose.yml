version: '3.8'

# Reusable security constraints for SentinelCell agents
x-sentinel-constraints: &sentinel-constraints
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M
  cap_drop:
    - ALL
  read_only: true
  env_file:
    - .env
  volumes:
    - ./logs:/logs
    - ./chroma_db:/app/chroma_db
  tmpfs:
    - /temp

services:
  # 1. FastAPI Gateway (Guardian Mode)
  fastapi_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_fastapi
    command: ["uvicorn", "src.gateways.fastapi_gateway:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - sentinel_net
    <<: *sentinel-constraints

  # 2. Redis MQ Worker (Async Mode)
  redis_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_redis_worker
    command: ["python", "-m", "src.gateways.redis_mq"]
    networks:
      - sentinel_net
    <<: *sentinel-constraints

  # 3. Dashboard Frontend (Nginx Isolated)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinelcell_dashboard
    ports:
      - "3000:80"
    networks:
      - sentinel_net
    depends_on:
      - fastapi_gateway
    <<: *sentinel-constraints
    cap_drop:
      - MAC_ADMIN
    tmpfs:
      - /temp
      - /var/cache/nginx
      - /var/run

  # 4. Local Ollama LLM
  ollama:
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: sentinelcell_ollama
    ports:
      - "11434:11434"
    networks:
      - sentinel_net
    volumes:
      - ollama_data:/root/.ollama
    cap_drop:
      - MAC_ADMIN
    # Optional GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  sentinel_net:
    name: sentinel_net
    external: true

volumes:
  ollama_data:
