version: '3.8'

# Reusable security constraints for SentinelCell agents
x-sentinel-constraints: &sentinel-constraints
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M
  cap_drop:
    - ALL
  read_only: true
  env_file:
    - .env
  volumes:
    - ./logs:/logs
    - chroma_db:/app/chroma_db
  tmpfs:
    - /temp
    - /tmp

services:
  # 1. FastAPI Gateway (Guardian Mode)
  fastapi_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_fastapi
    command: ["uvicorn", "src.gateways.fastapi_gateway:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - sentinel_net
    <<: *sentinel-constraints

  # 2. Redis MQ Worker (Async Mode)
  redis_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_redis_worker
    command: ["python", "-m", "src.gateways.ingress_mq"]
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - sentinel_net
    <<: *sentinel-constraints

  # 3. Dashboard Frontend (Nginx Isolated)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinelcell_dashboard
    ports:
      - "3000:80"
    networks:
      - sentinel_net
    depends_on:
      - fastapi_gateway
    <<: *sentinel-constraints
    cap_drop:
      - MAC_ADMIN
    tmpfs:
      - /temp
      - /var/cache/nginx
      - /var/run
  # 4. Redis In-Memory Datastore (Message Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: sentinelcell_redis
    ports:
      - "6379:6379"
    networks:
      - sentinel_net
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # 5. Local Ollama LLM (Conditional via Profile)
  ollama:
    profiles:
      - ollama
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: sentinelcell_ollama
    ports:
      - "11434:11434"
    networks:
      - sentinel_net
    volumes:
      - ollama_data:/root/.ollama
    cap_drop:
      - MAC_ADMIN

networks:
  sentinel_net:
    name: sentinel_net
    external: true

volumes:
  redis_data:
  ollama_data:
  chroma_db:
