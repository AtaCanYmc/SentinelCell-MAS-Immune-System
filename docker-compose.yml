version: '3.8'

# Reusable security constraints for SentinelCell agents
x-sentinel-constraints: &sentinel-constraints
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 2G
  cap_drop:
    - ALL
  read_only: true
  env_file:
    - .env
  volumes:
    - ./logs:/app/logs
    - chroma_db:/app/chroma_db
    - type: tmpfs
      target: /tmp
      tmpfs:
        mode: 1777 # Standard Linux temporary directory permissions
    - type: tmpfs
      target: /temp
      tmpfs:
        mode: 1777
    - type: tmpfs
      target: /home/sentinel/.gunicorn
      tmpfs:
        mode: 0777 # Gunicorn needs write access for PID files and sockets
    - type: tmpfs
      target: /run
    - type: tmpfs
      target: /var/run
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # 1. FastAPI Gateway (Guardian Mode)
  fastapi_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_fastapi
    restart: unless-stopped
    command: [ "gunicorn", "src.gateways.fastapi_gateway:app", "-w", "1", "-k", "uvicorn.workers.UvicornWorker", "-b", "0.0.0.0:8000", "--no-control-socket", "--worker-tmp-dir", "/dev/shm" ]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_DIR=/app/logs
      - TMPDIR=/dev/shm
    networks:
      - sentinel_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    <<: *sentinel-constraints

  # 2. Redis MQ Worker (Async Mode)
  redis_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelcell_redis_worker
    restart: unless-stopped
    command: [ "python", "-m", "src.gateways.ingress_mq" ]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_DIR=/app/logs
    networks:
      - sentinel_net
    depends_on:
      redis:
        condition: service_healthy
      fastapi_gateway:
        condition: service_healthy
    <<: *sentinel-constraints

  # 3. Dashboard Frontend (Nginx Isolated)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinelcell_dashboard
    restart: unless-stopped
    ports:
      - "3000:8080"
    networks:
      - sentinel_net
    depends_on:
      fastapi_gateway:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    cap_drop:
      - ALL
      - MAC_ADMIN
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - chroma_db:/app/chroma_db
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Redis In-Memory Datastore (Message Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: sentinelcell_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sentinel_net
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # 5. Local Ollama LLM (Conditional via Profile)
  ollama:
    profiles:
      - ollama
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: sentinelcell_ollama
    ports:
      - "11434:11434"
    networks:
      - sentinel_net
    volumes:
      - ollama_data:/root/.ollama
    cap_drop:
      - MAC_ADMIN

  # 6. PostgreSQL with pgvector (Optional for Vector DB)
  sentinel-postgres:
    profiles:
      - postgres
    image: pgvector/pgvector:pg16
    container_name: sentinel_pgvector
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sentinel_db
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sentinel_net

networks:
  sentinel_net:
    name: sentinel_net
    # Uncomment if you want docker-compose to manage the network automatically:
    # external: true
    # driver: bridge

  # For production with existing external network:
  # Create first with: docker network create sentinel_net

volumes:
  redis_data:
  ollama_data:
  chroma_db:
