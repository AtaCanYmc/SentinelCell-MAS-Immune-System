version: '3.8'

services:
  sentinel-postgres:
    image: pgvector/pgvector:pg16
    container_name: sentinel_pgvector
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sentinel_db
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sentinel_net

volumes:
  pgvector_data:

networks:
  sentinel_net:
    external: true
    name: sentinel_net
