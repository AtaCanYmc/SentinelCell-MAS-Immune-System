version: '3.8'

services:
  # 1. Elasticsearch Node 1 (Master/Data)
  elasticsearch-1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: sentinelcell_elasticsearch_1
    environment:
      - node.name=elasticsearch-1
      - cluster.name=sentinel-es-cluster
      - discovery.seed_hosts=elasticsearch-2
      - cluster.initial_master_nodes=elasticsearch-1,elasticsearch-2
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}"
    volumes:
      - elastic_data_1:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Elasticsearch Node 2 (Data/HA)
  elasticsearch-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: sentinelcell_elasticsearch_2
    environment:
      - node.name=elasticsearch-2
      - cluster.name=sentinel-es-cluster
      - discovery.seed_hosts=elasticsearch-1
      - cluster.initial_master_nodes=elasticsearch-1,elasticsearch-2
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}"
    volumes:
      - elastic_data_2:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - sentinel_net

  # 3. Prometheus (Time-Series Metrics Scraper)
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinelcell_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    # Removed ports 9090 to isolate from host.
    restart: unless-stopped
    networks:
      - sentinel_net

  # 4. Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: sentinelcell_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-supersecret_grafana_pass}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sentinel_net

  # 5. Node Exporter (Host Metrics)
  node_exporter:
    image: prom/node-exporter:latest
    container_name: sentinelcell_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - sentinel_net

  # 6. cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: sentinelcell_cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped
    networks:
      - sentinel_net

  # 7. Filebeat (Log Shipper)
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: sentinelcell_filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
    depends_on:
      elasticsearch-1:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentinel_net

volumes:
  elastic_data_1:
  elastic_data_2:
  prom_data:
  grafana_data:

networks:
  sentinel_net:
    external: true
    name: sentinel_net
