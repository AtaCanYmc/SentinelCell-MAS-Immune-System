name: Publish Docker Images to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/sentinelcell-backend
  DASHBOARD_IMAGE_NAME: ${{ github.repository_owner }}/sentinelcell-dashboard

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc48c0fab935c3b628b5934663a94854c5a5 # v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70b7726679063b627513b1d62c2f0a824a73717 # v3.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@078e56031f1f903a2baa81c02167d6c60205beaf # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@369eb224f7f10901a5b9c0a1fde69d761d675024 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}

      - name: Build and push Backend image
        uses: docker/build-push-action@ca052c295db09e42e6586b5869129722d83668be # v5.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (tags, labels) for Dashboard
        id: meta-dashboard
        uses: docker/metadata-action@369eb224f7f10901a5b9c0a1fde69d761d675024 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE_NAME }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@ca052c295db09e42e6586b5869129722d83668be # v5.3.0
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
