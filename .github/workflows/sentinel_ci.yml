name: SentinelCell Immune System CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Code & Docker Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: "3.11"

      - name: Run Ruff Checks
        run: |
          pip install ruff
          echo "Running Ruff linter..."
          ruff check .
          echo "Running Ruff formatter check..."
          ruff format --check .

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: error

  security:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: "3.11"

      - name: Phase 1 - Safety Scan (Secrets Detection)
        run: |
          echo "Scanning codebase for hardcoded secrets..."
          if grep -rE 'GEMINI_API_KEY=["'\''][^"'\''\.]+["'\'']' src/; then
            echo "::error::Security Breach: Hardcoded API keys found in src/!"
            exit 1
          fi
          echo "Safety Scan Passed."

      - name: Run Dependency Audit & SAST Scan
        run: |
          pip install pip-audit bandit
          echo "Running dependency vulnerability audit..."
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-311
          echo "Running Bandit SAST..."
          bandit -r src/ -x tests/ -ll

  test:
    name: Unit Testing & Sandbox Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests (Pytest)
        run: |
          echo "Executing Pytest and verifying coverage >= 50%..."
          pytest tests/unit/ -v --cov=src --cov-fail-under=50 --cov-report=term-missing --cov-report=xml

      - name: Sandbox Integration Verification
        run: |
          echo "Deploying to Antigravity Sandbox (Verification)..."
          python -c "from src.skills.repair import SelfHealingEngine; engine = SelfHealingEngine(); print('Sandbox execution successful.')"

  docs:
    name: Docs Standards Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify Documentation Files
        run: |
          echo "Verifying README.md and CHANGELOG.md standards..."
          if [ ! -f "CHANGELOG.md" ] || [ ! -f "README.md" ]; then
            echo "::error::Missing required documentation files!"
            exit 1
          fi

          REQUIRED_SECTIONS=("Philosophy" "Capability Matrix" "Deployment / DX" "Architecture")
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -q "$section" README.md; then
               echo "::error::README.md does not contain '$section' as required by readme_standards.md v2.0"
               exit 1
            fi
          done

          echo "Documentation verification passed."
